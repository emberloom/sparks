# examples/custom-ghost.toml
#
# Minimal ghost customization snippet.
# Append or merge this into your config.toml [[ghosts]] section,
# or place it at ~/.sparks/ghosts/reviewer.toml for user-local override.
#
# Usage:
#   cat examples/custom-ghost.toml >> config.toml
#
# See docs/feature-contract-v1.md for ghost field descriptions.

[[ghosts]]
# Unique name used with --ghost flag: `cargo run -- dispatch --ghost reviewer`
name = "reviewer"

# Shown in `cargo run -- ghosts` output and injected into the system prompt.
description = "Code review specialist: reads diffs, identifies issues, suggests improvements."

# Tools this ghost may use (tool names come from ToolRegistry in tools.rs).
tools = ["file_read", "shell", "git"]

# Execution strategy.
# "code"     — optimised for multi-file edits (default for coder ghost)
# "react"    — ReAct loop with observation steps
# "plan-act" — explicit plan phase before acting
strategy = "react"

# Optional path to a soul file (freeform markdown injected as system-prompt prefix).
# Relative paths resolve from the repo root; ~ paths expand to home directory.
# soul_file = "~/.sparks/souls/reviewer.md"

# Maximum tool-call steps before the ghost concludes.
# Overrides [manager].max_steps for this ghost.
# max_steps = 10

# Auto-approve patterns for this ghost (overrides global policy for this ghost).
# Use with caution — these bypass the confirmation gate.
# auto_approve_patterns = ["^git diff", "^cat "]

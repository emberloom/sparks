name: eval-real-gate

on:
  workflow_dispatch:

jobs:
  real-gate:
    # Intended for a self-hosted runner with Sparks runtime + credentials configured.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Sparks
        run: cargo build --bin sparks

      - name: Run real quality gate suite
        run: |
          python3 scripts/eval_harness.py \
            --suite eval/benchmark-real-gate.json \
            --config config.toml \
            --sparks-bin target/debug/sparks

      - name: Render dashboard
        run: |
          python3 scripts/eval_dashboard.py \
            --config config.toml \
            --repo sparks \
            --out-file eval/results/dashboard.md \
            --json-out-file eval/results/dashboard_data.json
          python3 scripts/eval_dashboard.py \
            --config config.toml \
            --repo sparks \
            --output-format html \
            --out-file eval/results/dashboard.html \
            --json-out-file eval/results/dashboard_data.json
          tail -n 120 eval/results/dashboard.md

      - name: Upload dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-real-gate-dashboard
          path: |
            eval/results/dashboard.md
            eval/results/dashboard.html
            eval/results/dashboard_data.json

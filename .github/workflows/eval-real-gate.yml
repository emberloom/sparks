name: eval-real-gate

on:
  workflow_dispatch:

jobs:
  real-gate:
    # Intended for a self-hosted runner with Athena runtime + credentials configured.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Athena
        run: cargo build --bin athena

      - name: Run real quality gate suite
        run: |
          python3 scripts/eval_harness.py \
            --suite eval/benchmark-real-gate.json \
            --config config.toml \
            --athena-bin target/debug/athena

      - name: Render dashboard
        run: |
          python3 scripts/eval_dashboard.py --config config.toml --repo athena
          tail -n 120 eval/results/dashboard.md

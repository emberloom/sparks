name: maintenance-pack

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cargo check
        run: cargo check -q

      - name: Cargo test
        run: cargo test -q

      - name: Cargo test (telegram feature)
        run: cargo test -q --features telegram

      - name: Cargo check (slack feature)
        run: cargo check -q --features slack

      - name: Cargo test (slack feature)
        run: cargo test -q --features slack

      - name: Doctor guard
        env:
          SPARKS_DISABLE_HOME_PROFILES: "1"
        run: cargo run --quiet -- doctor --skip-llm

      - name: Dead code gate
        run: |
          ./scripts/dead_code_check.py --telegram

      - name: Wiring & plumbing check
        run: |
          ./scripts/wiring_check.py

      - name: Hygiene check
        run: |
          ./scripts/hygiene_check.py

      - name: Maintainability regression check
        run: |
          ./scripts/maintainability_check.py

      - name: Cargo audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

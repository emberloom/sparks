name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.1). Defaults to the current ref name."
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release binary
        run: cargo build --release --bin athena

      - name: Generate observability dashboard artifacts
        run: |
          cat > /tmp/athena-release.toml <<'EOF'
          [db]
          path = "/tmp/athena-release.db"
          EOF
          python3 scripts/eval_dashboard.py \
            --config /tmp/athena-release.toml \
            --repo athena \
            --out-file eval/results/dashboard.md \
            --json-out-file eval/results/dashboard_data.json
          python3 scripts/eval_dashboard.py \
            --config /tmp/athena-release.toml \
            --repo athena \
            --output-format html \
            --out-file eval/results/dashboard.html \
            --json-out-file eval/results/dashboard_data.json

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/release/athena dist/athena-linux-x86_64
          tar -C dist -czf dist/athena-linux-x86_64.tar.gz athena-linux-x86_64
          shasum -a 256 dist/athena-linux-x86_64.tar.gz > dist/athena-linux-x86_64.tar.gz.sha256
          cp eval/results/dashboard.md dist/dashboard.md
          cp eval/results/dashboard.html dist/dashboard.html
          cp eval/results/dashboard_data.json dist/dashboard_data.json
          ls -lh dist

      - name: Upload release dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-observability-dashboard
          path: |
            dist/dashboard.md
            dist/dashboard.html
            dist/dashboard_data.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          FILES="dist/athena-linux-x86_64.tar.gz dist/athena-linux-x86_64.tar.gz.sha256 dist/dashboard.md dist/dashboard.html dist/dashboard_data.json"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" $FILES --clobber
          else
            gh release create "$TAG" --generate-notes $FILES
          fi

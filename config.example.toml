# LLM provider: "openai" (default), "ollama", "openrouter", or "zen"
# Inline secrets in config.toml are blocked by default. Use env vars, a .env file (gitignored),
# or `sparks secrets set <key>` to store credentials in the OS keyring.
# Set SPARKS_ALLOW_INLINE_SECRETS=1 only if you must run with inline secrets.
[runtime]
# Runtime security/deployment profile:
# - "container_strict" (default, Docker-isolated execution)
# - "self_dev_trusted" (trusted host execution only for allowlisted repos)
# - "local_only" (fully local provider/integration constraints)
profile = "container_strict"

[llm]
provider = "openai"

# OpenAI-compatible API server (for IDE/client integrations).
# Disabled by default; when enabled, Sparks exposes:
# - GET  /v1/models
# - POST /v1/chat/completions
[openai_api]
enabled = false
bind = "127.0.0.1:8787"
# Set a bearer key in env (recommended):
# export SPARKS_OPENAI_API_KEY="change-me"
api_key_env = "SPARKS_OPENAI_API_KEY"
principal = "self"
requests_per_minute = 120
burst = 30
# Optional explicit model IDs to advertise (defaults include "sparks", current model, and ghost IDs).
# advertised_models = ["sparks", "sparks/coder", "sparks/scout"]

# Fully local profile (copy into your active config):
# [runtime]
# profile = "local_only"
# [llm]
# provider = "ollama"
# [ollama]
# url = "http://127.0.0.1:11434"
# model = "qwen2.5:7b"
# classifier_model = "qwen2.5:3b"
# [db]
# path = "~/.sparks/sparks.db"
# [embedding]
# enabled = true
# model_dir = "~/.sparks/models/all-MiniLM-L6-v2"
# [ticket_intake]
# enabled = false
# sources = []
# [ticket_intake.webhook]
# enabled = false
# [langfuse]
# enabled = false

# OpenAI subscription via OAuth (used by Telegram by default).
# Run `sparks openai login` to store tokens in auth_file (default: ~/.sparks/openai.json).
# [openai]
# url = "https://chatgpt.com/backend-api/codex"
# api_style = "responses"             # or "chat_completions"
# model = "gpt-5.3-codex"
# classifier_model = "gpt-5.3-codex"  # optional, defaults to model
# auth_file = "~/.sparks/openai.json"
# redirect_uri = "http://localhost:1455/auth/callback"
# reasoning_effort = "medium"
# reasoning_summary = "auto"
# include = ["reasoning.encrypted_content"]
# temperature = 0.3
# max_tokens = 4096

[ollama]
url = "http://localhost:11434"
model = "qwen2.5:7b"
classifier_model = "qwen2.5:3b"    # lighter model for routing decisions
temperature = 0.3
max_tokens = 4096

# Uncomment to use OpenRouter (set OPENROUTER_API_KEY env; inline api_key is blocked by default)
# [openrouter]
# model = "google/gemini-2.5-flash"                # ghost/ReAct loop
# classifier_model = "google/gemini-2.5-flash-lite" # routing decisions (optional, defaults to model)
# url = "https://openrouter.ai/api/v1"
# api_key = ""  # discouraged; use OPENROUTER_API_KEY env var, .env, or `sparks secrets set openrouter.api_key`
# temperature = 0.3
# max_tokens = 4096

# Uncomment to use Opencode Zen (set OPENCODE_API_KEY env; inline api_key is blocked by default)
# [zen]
# model = "zen-v1"
# classifier_model = "zen-v1-mini"  # optional, defaults to model
# url = "https://opencode.ai/zen/v1"
# api_key = ""  # discouraged; use OPENCODE_API_KEY env var, .env, or `sparks secrets set zen.api_key`
# temperature = 0.3
# max_tokens = 4096

[docker]
# For Rust repos, use a Rust image so cargo/rustc exist inside ghost execution env.
# Pin images by digest for reproducibility, e.g.:
# image = "rust@sha256:<digest>"
image = "rust:1.93"
socket_path = "/var/run/docker.sock"
runtime = "runc"
memory_limit = 268435456
cpu_quota = 50000
timeout_secs = 600

[db]
path = "~/.sparks/sparks.db"

[manager]
max_steps = 15
# For runtime.profile = "self_dev_trusted", recommended:
# max_steps = 30
# Sensitive patterns have comprehensive defaults — uncomment to override:
# sensitive_patterns = ["rm\\s", "sudo", "curl.*\\|.*sh", "chmod.*777"]

[manager.loop_guard]
# Detect repeated identical tool calls and break loops early.
enabled = true
# Keep only this many most-recent tool call fingerprints per execution session.
window_size = 12
# Trigger breaker when the same fingerprint appears this many times within the window.
repeat_threshold = 2

[self_dev]
enabled = false
# Only used when runtime.profile = "self_dev_trusted"
# trusted_repos = ["sparks"]
# For trusted self-dev workloads, also ensure:
# [docker]
# timeout_secs = 600

[mcp]
enabled = false
# How long discovered MCP capabilities stay fresh before a refresh attempt.
discovery_ttl_secs = 60

# Example stdio server (tool names become "mcp:<server>:<tool>").
# [[mcp.servers]]
# name = "linear"
# enabled = true
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-linear"]
# env = ["LINEAR_API_KEY"]
# timeout_secs = 30
# reconnect_delay_secs = 5
# requires_confirmation = true
# allowed_tools = ["search_documents", "get_issue", "mcp:linear:search_documents"]

# Sparks's persona — soul file is a freeform markdown identity document
# loaded at startup and injected as the first section of the manager's system prompt.
[persona]
# soul_file = "~/.sparks/souls/sparks.md"

# Ghosts are sub-agents that execute tasks inside Docker containers.
# Each ghost can have its own soul file for personality/identity.
# For deterministic CI/local runs, set SPARKS_DISABLE_HOME_PROFILES=1 to ignore ~/.sparks/ghosts overrides.
[[ghosts]]
name = "coder"
description = "Complex multi-file coding tasks: refactoring, new features, bug fixes across files."
tools = ["file_read", "file_write", "shell", "git", "gh"]
role = "coder"
strategy = "code"
# soul_file = "~/.sparks/souls/coder.md"
# skill_file = "~/.sparks/skills/coder.md"
# skill_files = ["~/.sparks/skills/rust-core.md", "~/.sparks/skills/secure-coding.md"]
# Multiple skill files are merged in order (legacy `skill_file` is still supported).
# To reuse a skill between ghosts, point both ghosts at the same file path.

[[ghosts.mounts]]
host_path = "."
container_path = "/workspace"
read_only = false

[[ghosts]]
name = "scout"
description = "Explores files and runs read-only commands. Cannot modify anything."
tools = ["file_read", "shell"]
role = "worker"
strategy = "react"
# soul_file = "~/.sparks/souls/scout.md"
# skill_file = "~/.sparks/skills/scout.md"
# skill_files = ["~/.sparks/skills/rust-core.md"]

[[ghosts.mounts]]
host_path = "."
container_path = "/workspace"
read_only = true

[embedding]
enabled = true
# model_dir = "~/.sparks/models/all-MiniLM-L6-v2"

[memory]
# Half-life for recency decay in days. Memories older than this get 50% weight.
# recency_half_life_days = 30.0
# Cosine similarity threshold for deduplication. Memories above this are merged.
# dedup_threshold = 0.95
# In-process LRU capacity for hybrid retrieval results (0 disables cache).
# retrieval_cache_capacity = 256
# Enable HNSW approximate nearest-neighbor index for semantic retrieval.
# hnsw_enabled = true
# Minimum embedded memory count before HNSW is built (below this uses exact cosine fallback).
# hnsw_min_index_size = 64
# HNSW graph connectivity parameter (typical range: 8-48).
# hnsw_m = 16
# HNSW construction breadth (higher is slower build, better recall).
# hnsw_ef_construction = 200
# HNSW query breadth (higher is slower query, better recall).
# hnsw_ef_search = 64
# Half-life (days) for exponential decay scoring used by 'sparks memory prune' (0 = no decay).
# score = exp(-ln(2) / decay_half_life_days * age_days)
# decay_half_life_days = 30.0
# Soft cap on total active memories (0 = unlimited). Used as guidance for pruning.
# max_entries = 10000

[telegram]
# token = "your-bot-token"   # discouraged; use SPARKS_TELEGRAM_TOKEN env var, .env, or `sparks secrets set telegram.token`
# provider = "openai"         # optional, defaults to "openai" ("ouath" alias still works)
allowed_chats = [374512753]    # list of allowed chat IDs
allow_all = false              # must be true to allow all chats (bot refuses to start otherwise)
confirm_timeout_secs = 300
# Planning interview flow
planning_enabled = true
planning_auto = true
planning_timeout_secs = 900

[slack]
# mode = "socket"                      # "socket" (default, no public URL) or "events_api"
# bot_token = "xoxb-..."               # discouraged; use SPARKS_SLACK_BOT_TOKEN env var, .env, or `sparks secrets set slack.bot_token`
# app_token = "xapp-..."               # required for Socket Mode; use SPARKS_SLACK_APP_TOKEN env var
# signing_secret = ""                   # required for Events API; use SPARKS_SLACK_SIGNING_SECRET env var
# events_api_bind = "127.0.0.1:3000"   # HTTP bind for Events API mode
# provider = "openai"                   # optional LLM provider override
# allowed_channels = ["C0123456789"]    # list of allowed Slack channel IDs
# allow_all = false
# confirm_timeout_secs = 300
# thread_replies = true                 # always reply in threads (default)
# planning_enabled = true
# planning_auto = true
# planning_timeout_secs = 900

[teams]
# app_id = ""                        # Azure AD App ID; prefer SPARKS_TEAMS_APP_ID env var
# app_password = ""                  # Azure AD App Password; prefer SPARKS_TEAMS_APP_PASSWORD env var
# bind_addr = "0.0.0.0:3979"        # HTTP bind address for Bot Framework webhook
# provider = "openai"                # optional LLM provider override
# allowed_tenants = ["your-tenant-id"]  # list of allowed Azure AD tenant IDs
# allow_all_tenants = false          # if true, any tenant may interact (use with caution)
# rate_limit_secs = 5                # per-user+conversation cooldown in seconds
# confirm_timeout_secs = 300
# planning_enabled = true
# planning_auto = true
# planning_timeout_secs = 900
# skip_auth = false                  # NEVER set to true in production

[github]
# token = "ghp_..."  # discouraged; prefer GH_TOKEN env var, .env, or `sparks secrets set github.token`

[ticket_intake]
enabled = false
poll_interval_secs = 300
# When true, ticket intake tasks are auto-completed without executing a ghost (useful for CI).
mock_dispatch = false
# Fetch full issue context (comments, PR diff) and inject into task context.
# Increases token usage per task but significantly improves task quality.
# inject_full_context = false
# Maximum characters to inject from rich ticket context (default: 4000).
# rich_context_char_cap = 4000

[ticket_intake.ci_autopilot]
# End-to-end bridge used by ticket intake and feature-contract dispatch:
# dispatch -> PR -> CI poll -> self-heal -> auto-merge -> post-merge checks -> revert PR on failure
enabled = true
auto_merge = true
heal = true
max_heal_attempts = 2
poll_interval_secs = 45
timeout_secs = 1200

# [[ticket_intake.sources]]
# provider = "github"
# repo = "myorg/myrepo"
# filter_label = "sparks"
# token_env = "GH_TOKEN"  # or use `sparks secrets set github.token`

# [[ticket_intake.sources]]
# provider = "gitlab"
# repo = "mygroup/myproject"
# filter_label = "sparks"
# api_base = "https://gitlab.example.com/api/v4"
# token_env = "GITLAB_TOKEN"  # or use `sparks secrets set gitlab.token`

# [[ticket_intake.sources]]
# provider = "linear"
# repo = "ENG"
# filter_label = "sparks"
# api_base = "https://api.linear.app/graphql"
# token_env = "LINEAR_API_KEY"  # or use `sparks secrets set linear.api_key`

# [[ticket_intake.sources]]
# provider = "jira"
# repo = "PROJ"
# api_base = "https://mycompany.atlassian.net"
# filter_label = "sparks"
# token_env = "JIRA_API_TOKEN"  # or use `sparks secrets set jira.api_token`
# email_env = "JIRA_EMAIL"

# [ticket_intake.webhook]
# enabled = false
# bind = "127.0.0.1:8765"
# github_secret_env = "GITHUB_WEBHOOK_SECRET"
# gitlab_secret_env = "GITLAB_WEBHOOK_TOKEN"
# linear_secret_env = "LINEAR_WEBHOOK_SECRET"
# jira_secret_env = "JIRA_WEBHOOK_SECRET"

[prompt_scanner]
# Input-layer scanner runs before classifier/LLM execution for chat + autonomous tasks.
enabled = true
# `flag_only` logs findings and continues, `block` rejects risky inputs before model execution.
mode = "flag_only"
flag_threshold = 4
block_threshold = 8
max_findings = 8
max_log_chars = 180

[prompt_scanner.allowlist]
# Optional safety valve for known false positives.
ticket_ids = []
repos = []
providers = []
authors = []
text_patterns = []
# If true, allowlisted inputs are downgraded from block -> flag.
downgrade_block_to_flag = true

# [[prompt_scanner.mode_overrides]]
# provider = "linear"
# repo = "LNY"
# mode = "block"

# Langfuse observability - traces all LLM calls and agent activities
# Get keys at https://cloud.langfuse.com (free tier) or self-host with Docker
[langfuse]
enabled = true  # set to false to disable
# public_key = "pk-..."    # discouraged; prefer LANGFUSE_PUBLIC_KEY env var, .env, or `sparks secrets set langfuse.public_key`
# secret_key = "sk-..."    # discouraged; prefer LANGFUSE_SECRET_KEY env var, .env, or `sparks secrets set langfuse.secret_key`
# base_url = "http://localhost:3000"  # for self-hosted, defaults to cloud

# Proactive alerting engine — evaluates alert rules against the activity log
# and delivers notifications via the configured channel.
[alerts]
enabled = true
# How often to evaluate alert rules, in seconds
check_interval_secs = 30
# Delivery channel: "log" (default), "webhook", "slack", "teams"
delivery_channel = "log"
# Minimum severity to deliver: "info" (default), "warning", "critical"
min_severity = "info"
# Silence window: suppress repeated alerts for this many seconds (default 5 min)
silence_secs = 300
# Webhook URL (required when delivery_channel = "webhook")
# webhook_url = "https://hooks.example.com/your-token"

# ── Workspace snapshots (time-travel debugging) ──────────────────────────────
# Snapshots are opt-in. Enable to allow 'sparks snapshot create|list|diff|restore'.
[snapshot]
# Set to true to enable snapshot commands (default: false).
enabled = false

# Directory to store snapshots (default: ~/.sparks/snapshots).
# snapshot_dir = "~/.sparks/snapshots"

# Maximum number of snapshots to retain. Oldest are pruned automatically.
# Set to 0 for unlimited. (default: 20)
max_snapshots = 20

# Skip snapshot if the workspace exceeds this size in MB. Set to 0 to disable.
# (default: 50)
max_workspace_mb = 50

# Paths to include in the snapshot, relative to the workspace root.
# (default: ["."] — the whole workspace)
include = ["."]

# Paths/patterns to exclude from the snapshot.
# (default: target/, .git/, .worktrees/, *.db, *.log)
exclude = ["target/", ".git/", ".worktrees/", "*.db", "*.log"]

# Ghost performance leaderboard and A/B testing.
# Run `sparks leaderboard show` to view rankings, or `sparks leaderboard compare ghost-a ghost-b`.
[leaderboard]
enabled = true
# Ghost name to A/B test against the default ghost. Omit or leave empty to disable A/B routing.
# ab_test_ghost = "experimental-coder"
# Fraction of requests routed to the challenger ghost (0.0 = never, 1.0 = always).
ab_test_fraction = 0.1
# Minimum recorded samples before a promotion recommendation is surfaced.
min_samples_for_recommendation = 50
# Success-rate improvement (as a fraction) required to trigger a promotion recommendation.
promotion_threshold = 0.10

# LLM provider: "openai" (default), "ollama", "openrouter", or "zen"
# Inline secrets in config.toml are blocked by default. Use env vars, a .env file (gitignored),
# or `athena secrets set <key>` to store credentials in the OS keyring.
# Set ATHENA_ALLOW_INLINE_SECRETS=1 only if you must run with inline secrets.
[runtime]
# Runtime security/deployment profile:
# - "container_strict" (default, Docker-isolated execution)
# - "self_dev_trusted" (trusted host execution only for allowlisted repos)
# - "local_only" (fully local provider/integration constraints)
profile = "container_strict"

[llm]
provider = "openai"

# OpenAI-compatible API server (for IDE/client integrations).
# Disabled by default; when enabled, Athena exposes:
# - GET  /v1/models
# - POST /v1/chat/completions
[openai_api]
enabled = false
bind = "127.0.0.1:8787"
# Set a bearer key in env (recommended):
# export ATHENA_OPENAI_API_KEY="change-me"
api_key_env = "ATHENA_OPENAI_API_KEY"
principal = "self"
requests_per_minute = 120
burst = 30
# Optional explicit model IDs to advertise (defaults include "athena", current model, and ghost IDs).
# advertised_models = ["athena", "athena/coder", "athena/scout"]

# Fully local profile (copy into your active config):
# [runtime]
# profile = "local_only"
# [llm]
# provider = "ollama"
# [ollama]
# url = "http://127.0.0.1:11434"
# model = "qwen2.5:7b"
# classifier_model = "qwen2.5:3b"
# [db]
# path = "~/.athena/athena.db"
# [embedding]
# enabled = true
# model_dir = "~/.athena/models/all-MiniLM-L6-v2"
# [ticket_intake]
# enabled = false
# sources = []
# [ticket_intake.webhook]
# enabled = false
# [langfuse]
# enabled = false

# OpenAI subscription via OAuth (used by Telegram by default).
# Run `athena openai login` to store tokens in auth_file (default: ~/.athena/openai.json).
# [openai]
# url = "https://chatgpt.com/backend-api/codex"
# api_style = "responses"             # or "chat_completions"
# model = "gpt-5.3-codex"
# classifier_model = "gpt-5.3-codex"  # optional, defaults to model
# auth_file = "~/.athena/openai.json"
# redirect_uri = "http://localhost:1455/auth/callback"
# reasoning_effort = "medium"
# reasoning_summary = "auto"
# include = ["reasoning.encrypted_content"]
# temperature = 0.3
# max_tokens = 4096

[ollama]
url = "http://localhost:11434"
model = "qwen2.5:7b"
classifier_model = "qwen2.5:3b"    # lighter model for routing decisions
temperature = 0.3
max_tokens = 4096

# Uncomment to use OpenRouter (set OPENROUTER_API_KEY env; inline api_key is blocked by default)
# [openrouter]
# model = "google/gemini-2.5-flash"                # ghost/ReAct loop
# classifier_model = "google/gemini-2.5-flash-lite" # routing decisions (optional, defaults to model)
# url = "https://openrouter.ai/api/v1"
# api_key = ""  # discouraged; use OPENROUTER_API_KEY env var, .env, or `athena secrets set openrouter.api_key`
# temperature = 0.3
# max_tokens = 4096

# Uncomment to use Opencode Zen (set OPENCODE_API_KEY env; inline api_key is blocked by default)
# [zen]
# model = "zen-v1"
# classifier_model = "zen-v1-mini"  # optional, defaults to model
# url = "https://opencode.ai/zen/v1"
# api_key = ""  # discouraged; use OPENCODE_API_KEY env var, .env, or `athena secrets set zen.api_key`
# temperature = 0.3
# max_tokens = 4096

[docker]
# For Rust repos, use a Rust image so cargo/rustc exist inside ghost execution env.
# Pin images by digest for reproducibility, e.g.:
# image = "rust@sha256:<digest>"
image = "rust:1.93"
socket_path = "/var/run/docker.sock"
runtime = "runc"
memory_limit = 268435456
cpu_quota = 50000
timeout_secs = 600

[db]
path = "~/.athena/athena.db"

[manager]
max_steps = 15
# For runtime.profile = "self_dev_trusted", recommended:
# max_steps = 30
# Sensitive patterns have comprehensive defaults — uncomment to override:
# sensitive_patterns = ["rm\\s", "sudo", "curl.*\\|.*sh", "chmod.*777"]

[manager.loop_guard]
# Detect repeated identical tool calls and break loops early.
enabled = true
# Keep only this many most-recent tool call fingerprints per execution session.
window_size = 12
# Trigger breaker when the same fingerprint appears this many times within the window.
repeat_threshold = 2

[self_dev]
enabled = false
# Only used when runtime.profile = "self_dev_trusted"
# trusted_repos = ["athena"]
# For trusted self-dev workloads, also ensure:
# [docker]
# timeout_secs = 600

[mcp]
enabled = false
# How long discovered MCP capabilities stay fresh before a refresh attempt.
discovery_ttl_secs = 60

# Example stdio server (tool names become "mcp:<server>:<tool>").
# [[mcp.servers]]
# name = "linear"
# enabled = true
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-linear"]
# env = ["LINEAR_API_KEY"]
# timeout_secs = 30
# reconnect_delay_secs = 5
# requires_confirmation = true
# allowed_tools = ["search_documents", "get_issue", "mcp:linear:search_documents"]

# Athena's persona — soul file is a freeform markdown identity document
# loaded at startup and injected as the first section of the manager's system prompt.
[persona]
# soul_file = "~/.athena/souls/athena.md"

# Ghosts are sub-agents that execute tasks inside Docker containers.
# Each ghost can have its own soul file for personality/identity.
# For deterministic CI/local runs, set ATHENA_DISABLE_HOME_PROFILES=1 to ignore ~/.athena/ghosts overrides.
[[ghosts]]
name = "coder"
description = "Complex multi-file coding tasks: refactoring, new features, bug fixes across files."
tools = ["file_read", "file_write", "shell", "git", "gh"]
role = "coder"
strategy = "code"
# soul_file = "~/.athena/souls/coder.md"
# skill_file = "~/.athena/skills/coder.md"
# skill_files = ["~/.athena/skills/rust-core.md", "~/.athena/skills/secure-coding.md"]
# Multiple skill files are merged in order (legacy `skill_file` is still supported).
# To reuse a skill between ghosts, point both ghosts at the same file path.

[[ghosts.mounts]]
host_path = "."
container_path = "/workspace"
read_only = false

[[ghosts]]
name = "scout"
description = "Explores files and runs read-only commands. Cannot modify anything."
tools = ["file_read", "shell"]
role = "worker"
strategy = "react"
# soul_file = "~/.athena/souls/scout.md"
# skill_file = "~/.athena/skills/scout.md"
# skill_files = ["~/.athena/skills/rust-core.md"]

[[ghosts.mounts]]
host_path = "."
container_path = "/workspace"
read_only = true

[embedding]
enabled = true
# model_dir = "~/.athena/models/all-MiniLM-L6-v2"

[memory]
# Half-life for recency decay in days. Memories older than this get 50% weight.
# recency_half_life_days = 30.0
# Cosine similarity threshold for deduplication. Memories above this are merged.
# dedup_threshold = 0.95
# In-process LRU capacity for hybrid retrieval results (0 disables cache).
# retrieval_cache_capacity = 256
# Enable HNSW approximate nearest-neighbor index for semantic retrieval.
# hnsw_enabled = true
# Minimum embedded memory count before HNSW is built (below this uses exact cosine fallback).
# hnsw_min_index_size = 64
# HNSW graph connectivity parameter (typical range: 8-48).
# hnsw_m = 16
# HNSW construction breadth (higher is slower build, better recall).
# hnsw_ef_construction = 200
# HNSW query breadth (higher is slower query, better recall).
# hnsw_ef_search = 64

[telegram]
# token = "your-bot-token"   # discouraged; use ATHENA_TELEGRAM_TOKEN env var, .env, or `athena secrets set telegram.token`
# provider = "openai"         # optional, defaults to "openai" ("ouath" alias still works)
allowed_chats = [374512753]    # list of allowed chat IDs
allow_all = false              # must be true to allow all chats (bot refuses to start otherwise)
confirm_timeout_secs = 300
# Planning interview flow
planning_enabled = true
planning_auto = true
planning_timeout_secs = 900

# ── Telephony (phone calls via Twilio) ─────────────────────────────
# Requires: --features telephony
# Run: athena telephony
[telephony]
# provider = "openai"                           # LLM provider override (default: openai)
# twilio_account_sid = "AC..."                  # or ATHENA_TWILIO_ACCOUNT_SID env var
# twilio_auth_token = "..."                     # or ATHENA_TWILIO_AUTH_TOKEN env var
listen_host = "0.0.0.0"
listen_port = 8089
# public_url = "https://your-domain.ngrok.io"   # Required — URL Twilio can reach

# STT: use any Whisper-compatible API (FREE options below)
# Option 1: faster-whisper-server (self-hosted, free)
#   pip install faster-whisper-server && faster-whisper-server --model Systran/faster-whisper-large-v3
# Option 2: whisper.cpp server (self-hosted, free)
#   ./server -m models/ggml-large-v3.bin --port 8787
# Option 3: Groq (free tier, cloud)
#   stt_url = "https://api.groq.com/openai/v1/audio/transcriptions"
#   stt_api_key = "gsk_..." (or ATHENA_STT_API_KEY env var)
stt_url = "http://localhost:8787/v1/audio/transcriptions"
# stt_api_key = "..."                           # only needed for cloud STT
stt_model = "whisper-large-v3"

# TTS: use any OpenAI-compatible TTS API
# Option 1: Piper TTS (self-hosted, free) — pip install piper-tts
# Option 2: Kokoro TTS (self-hosted, free) — pip install kokoro
# Option 3: OpenAI TTS ($0.015/1K chars, cloud)
tts_url = "http://localhost:8880/v1/audio/speech"
# tts_api_key = "..."
tts_model = "tts-1"
tts_voice = "alloy"

# Greeting played when call connects
greeting = "Hello, this is Athena. How can I help you?"

# Voice Activity Detection (Silero VAD — free, local, ONNX)
# Download model: curl -L -o ~/.athena/silero_vad.onnx https://github.com/snakers4/silero-vad/raw/master/src/silero_vad/data/silero_vad.onnx
# vad_model_path = "~/.athena/silero_vad.onnx"  # auto-detected if omitted
vad_silence_ms = 800                             # ms of silence before end-of-speech
vad_threshold = 0.5                              # speech probability threshold (0.0 - 1.0)

[github]
# token = "ghp_..."  # discouraged; prefer GH_TOKEN env var, .env, or `athena secrets set github.token`

[ticket_intake]
enabled = false
poll_interval_secs = 300
# When true, ticket intake tasks are auto-completed without executing a ghost (useful for CI).
mock_dispatch = false

[ticket_intake.ci_autopilot]
# End-to-end bridge used by ticket intake and feature-contract dispatch:
# dispatch -> PR -> CI poll -> self-heal -> auto-merge -> post-merge checks -> revert PR on failure
enabled = true
auto_merge = true
heal = true
max_heal_attempts = 2
poll_interval_secs = 45
timeout_secs = 1200

# [[ticket_intake.sources]]
# provider = "github"
# repo = "myorg/myrepo"
# filter_label = "athena"
# token_env = "GH_TOKEN"  # or use `athena secrets set github.token`

# [[ticket_intake.sources]]
# provider = "gitlab"
# repo = "mygroup/myproject"
# filter_label = "athena"
# api_base = "https://gitlab.example.com/api/v4"
# token_env = "GITLAB_TOKEN"  # or use `athena secrets set gitlab.token`

# [[ticket_intake.sources]]
# provider = "linear"
# repo = "ENG"
# filter_label = "athena"
# api_base = "https://api.linear.app/graphql"
# token_env = "LINEAR_API_KEY"  # or use `athena secrets set linear.api_key`

# [[ticket_intake.sources]]
# provider = "jira"
# repo = "PROJ"
# api_base = "https://mycompany.atlassian.net"
# filter_label = "athena"
# token_env = "JIRA_API_TOKEN"  # or use `athena secrets set jira.api_token`
# email_env = "JIRA_EMAIL"

# [ticket_intake.webhook]
# enabled = false
# bind = "127.0.0.1:8765"
# github_secret_env = "GITHUB_WEBHOOK_SECRET"
# gitlab_secret_env = "GITLAB_WEBHOOK_TOKEN"
# linear_secret_env = "LINEAR_WEBHOOK_SECRET"
# jira_secret_env = "JIRA_WEBHOOK_SECRET"

[prompt_scanner]
# Input-layer scanner runs before classifier/LLM execution for chat + autonomous tasks.
enabled = true
# `flag_only` logs findings and continues, `block` rejects risky inputs before model execution.
mode = "flag_only"
flag_threshold = 4
block_threshold = 8
max_findings = 8
max_log_chars = 180

[prompt_scanner.allowlist]
# Optional safety valve for known false positives.
ticket_ids = []
repos = []
providers = []
authors = []
text_patterns = []
# If true, allowlisted inputs are downgraded from block -> flag.
downgrade_block_to_flag = true

# [[prompt_scanner.mode_overrides]]
# provider = "linear"
# repo = "LNY"
# mode = "block"

# Langfuse observability - traces all LLM calls and agent activities
# Get keys at https://cloud.langfuse.com (free tier) or self-host with Docker
[langfuse]
enabled = true  # set to false to disable
# public_key = "pk-..."    # discouraged; prefer LANGFUSE_PUBLIC_KEY env var, .env, or `athena secrets set langfuse.public_key`
# secret_key = "sk-..."    # discouraged; prefer LANGFUSE_SECRET_KEY env var, .env, or `athena secrets set langfuse.secret_key`
# base_url = "http://localhost:3000"  # for self-hosted, defaults to cloud
